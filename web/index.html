<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" href="data:," />
    <title>Mrzavec — Rogue 5.4.5</title>
    <style>
      :root {
        color-scheme: dark;
        background: #111;
        color: #d1d1c7;
        font-family: system-ui, sans-serif;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
      }

      main {
        width: min(100%, 984px);
        min-width: 0;
      }

      #mrzavec {
        display: block;
        width: 100% !important;
        max-width: 100%;
        height: auto !important;
        aspect-ratio: 984 / 696;
        outline: 1px solid #333;
        background: #000;
      }

      #mrzavec:focus {
        outline-color: #888;
      }

      p {
        margin: 0.75rem;
        font-size: 0.875rem;
      }
    </style>
  </head>
  <body>
    <main>
      <canvas
        id="mrzavec"
        tabindex="0"
        autofocus
        aria-label="Mrzavec game; use the keyboard to play"
      ></canvas>
      <p id="status">Loading the game…</p>
    </main>
    <script type="module">
      // __BUILD__ is replaced with the commit SHA at deploy time so a
      // cached copy of one file can never pair with a newer copy of the
      // other (grift.rs caches these for 4 hours).
      const build = "__BUILD__";
      const { default: init } = await import(`./pkg/mrzavec.js?v=${build}`);

      const canvas = document.querySelector("#mrzavec");
      const status = document.querySelector("#status");
      canvas.addEventListener("pointerdown", () => canvas.focus());
      canvas.focus();

      try {
        await init({ module_or_path: `./pkg/mrzavec_bg.wasm?v=${build}` });
        canvas.focus();
        status.textContent =
          "Use Rogue keyboard commands. Click the game if it loses focus.";
      } catch (error) {
        status.textContent = `Unable to start Mrzavec: ${error}`;
        throw error;
      }
    </script>
  </body>
</html>
