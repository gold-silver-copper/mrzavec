name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: Install binaryen for the wasm-opt size pass
        run: sudo apt-get update && sudo apt-get install --yes --no-install-recommends binaryen
      - name: Install the lockfile-compatible wasm-bindgen CLI
        run: |
          version=$(awk '
            $0 == "name = \"wasm-bindgen\"" {
              getline
              gsub(/\"/, "", $3)
              print $3
              exit
            }
          ' Cargo.lock)
          cargo install wasm-bindgen-cli --version "$version" --locked
      - name: Build web bundle
        run: ./scripts/build-wasm.sh
      - name: Stamp the build version into cache-busting URLs
        run: sed -i "s/__BUILD__/${GITHUB_SHA}/g" web/index.html
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
